name: Terraform Apply (Dev - Simulated, on merge to main)

on:
  push:
    branches: ["main"]

env:
  TF_VERSION: 1.6.6
  TF_ROOT: terraform-iac/environment

jobs:
  apply-dev:
    name: Simulated Apply (dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (dev)
        run: terraform -chdir=${{ env.TF_ROOT }}/dev init

      - name: Terraform Plan (Simulated Apply)
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform -chdir=${{ env.TF_ROOT }}/dev plan -no-color
