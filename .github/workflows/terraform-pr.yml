name: Terraform PR

on:
  pull_request:
    branches: [ "main" ]

env:
  TF_VERSION: 1.6.6
  TF_ROOT: terraform-iac/envrionments

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_ROOT }}/dev init

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_ROOT }}/dev validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          cd ${{ env.TF_ROOT }}/dev
          tflint --init
          tflint

      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/dev plan -no-color > plan.txt

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_ROOT }}/dev/plan.txt', 'utf8');

            const body = `## Terraform Plan Dev

\`\`\`
${plan.substring(0, 65000)}
\`\`\`
`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
