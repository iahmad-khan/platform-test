name: Terraform Apply (Gated, for production use case )

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - staging
          - production

env:
  TF_VERSION: 1.6.6
  TF_ROOT: terraform-iac/environments

jobs:

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      env_name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_ROOT }}/${{ github.event.inputs.environment }} init

      - name: Terraform Plan (save file)
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ github.event.inputs.environment }} plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}
          path: ${{ env.TF_ROOT }}/${{ github.event.inputs.environment }}/tfplan


  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    # THIS triggers approval gate
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}
          path: ${{ env.TF_ROOT }}/${{ github.event.inputs.environment }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_ROOT }}/${{ github.event.inputs.environment }} init

      # Simulated apply (safe for now)
      - name: Simulated Apply
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ github.event.inputs.environment }} show tfplan
